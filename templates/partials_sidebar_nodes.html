{{define "sidebar_nodes"}}
<aside class="sidebar" x-on:click.stop>
  <div class="sidebar-header">
    <div>
      <div class="sidebar-title">Server clusters</div>
    </div>
    <button
      class="nav-btn"
      style="width: 2.25rem; height: 2.25rem"
      x-on:click="closeNodes()"
      aria-label="Close"
    >
      <i class="fa-solid fa-xmark" style="font-size: 1rem"></i>
    </button>
  </div>
  <div class="sidebar-body">
    {{range .Clusters}}
    <a
      class="sidebar-link {{if eq $.ActiveCluster .}}active{{end}}"
      href="/clusters/{{.}}"
    >
      <span class="name">{{.}}</span>
      <span class="pill">Open</span>
    </a>

    {{if eq $.ActiveCluster .}}
    <a
      class="sidebar-link sidebar-sublink {{if eq $.ActiveClusterItem "vms"}}active{{end}}"
      href="/clusters/{{.}}/vms"
    >
      <span class="name">VMs</span>
    </a>
    <a
      class="sidebar-link sidebar-sublink {{if eq $.ActiveClusterItem "reverse-proxy"}}active{{end}}"
      href="/clusters/{{.}}/reverse-proxy"
    >
      <span class="name">Reverse Proxy</span>
    </a>
    <a
      class="sidebar-link sidebar-sublink {{if eq $.ActiveClusterItem "nodes"}}active{{end}}"
      href="/clusters/{{.}}/nodes"
    >
      <span class="name">Nodes</span>
    </a>
    {{end}}
    {{end}}
  </div>
</aside>
{{end}}
